{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'vinoteca_app/styles.css' %}">
    <link rel="stylesheet" href="{% static 'vinoteca_app/responsive.css' %}">
{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <h2 class="auth-title">Validación de cuenta</h2>

        {% if messages %}
            {% for message in messages %}
                <p class="auth-message">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label>{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
            <button type="submit" class="btn-submit">Validar token</button>
        </form>
    </div>
</section>
{% endblock %}
